<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Risk | Orbital AI System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #000000; --glass-bg: rgba(15, 23, 42, 0.75); --glass-border: rgba(255, 255, 255, 0.1); --primary: #ef4444; --secondary: #3b82f6; --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); background-image: radial-gradient(circle at center, #111 0%, #000 100%); color: var(--text-main); font-family: 'Inter', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; cursor: grab; }
        body:active { cursor: grabbing; }
        #header-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 999; width: 90%; max-width: 800px; background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); text-align: center; }
        h2 { margin: 0 0 8px 0; font-weight: 800; font-size: 1.5rem; letter-spacing: 1px; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        p { margin: 0; color: var(--text-muted); font-size: 0.95rem; }
        .dashboard-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;}
        #live-time { font-weight: 600; color: #fbbf24; }
        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        input[type="text"] { flex: 1; min-width: 200px; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.4); color: white; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: var(--secondary); }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        button:active { transform: scale(0.98); }
        .btn-search { background-color: var(--primary); color: white; }
        .btn-location { background-color: var(--secondary); color: white; display: flex; align-items: center; gap: 6px; }
        #loading-status { margin-top: 16px; font-size: 0.9rem; font-weight: 600; height: 20px; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .globe-marker { padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; color: white; cursor: pointer; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; align-items: center; gap: 6px; white-space: nowrap; pointer-events: auto; }
        .globe-marker:hover { transform: scale(1.15); box-shadow: 0 0 15px currentColor; }
        #custom-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; background-color: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); color: #ffffff; border: 2px solid var(--primary); border-radius: 12px; padding: 24px; min-width: 280px; display: none; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9); }
        .close-btn { position: absolute; top: 10px; right: 15px; background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
        #suggestions-box { position: absolute; top: 100%; left: 0; width: 100%; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 8px; margin-top: 4px; display: none; flex-direction: column; z-index: 1000; max-height: 250px; overflow-y: auto; }
        .suggestion-item { padding: 10px 16px; cursor: pointer; color: white; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .suggestion-item:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="header-container">
        <h2>Orbital Climate Array</h2>
        <div class="dashboard-meta">
            <span>Target Region: <strong id="target-region" style="color: white;">Global View</strong></span>
            <span id="live-time"></span>
        </div>
        <div class="controls">
            <div style="position: relative; flex: 1; min-width: 200px;">
                <input type="text" id="location-search" placeholder="Search City..." onkeydown="if(event.key === 'Enter') searchLocation()" oninput="handleSearchInput()">
                <div id="suggestions-box"></div>
            </div>
            <button class="btn-search" onclick="searchLocation()">Scan Region</button>
            <button class="btn-location" onclick="useMyLocation()">My Location</button>
        </div>
        <div id="loading-status">System Initialized. Awaiting AI telemetry...</div>
    </div>

    <div id="custom-popup"></div>
    <div id="map"></div>

    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script>
        function updateClock() {
            document.getElementById('live-time').innerText = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }) + " (IST)";
        }
        setInterval(updateClock, 1000); updateClock();

        // UPGRADE: Satellite Imagery & Atmosphere Glow
        const world = Globe()(document.getElementById('map'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
            .showAtmosphere(true)
            .atmosphereColor('lightskyblue')
            .atmosphereAltitude(0.15)
            .pointOfView({ lat: 20, lng: 79, altitude: 2.5 });

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;
        world.controls().addEventListener('start', () => world.controls().autoRotate = false);

        let globeData = [];
        let globeRings = [];

        const defaultCities = [
            { name: "Delhi", lat: 28.7041, lon: 77.1025 }, { name: "Mumbai", lat: 19.0760, lon: 72.8777 },
            { name: "Tokyo", lat: 35.6762, lon: 139.6503 }, { name: "New York", lat: 40.7128, lon: -74.0060 },
            { name: "Sydney", lat: -33.8688, lon: 151.2093 }, { name: "Dubai", lat: 25.2048, lon: 55.2708 }
        ];

        function setStatus(msg, color = 'var(--text-muted)') {
            const el = document.getElementById('loading-status');
            el.innerText = msg; el.style.color = color;
        }

        let debounceTimer;
        async function handleSearchInput() {
            clearTimeout(debounceTimer);
            const query = document.getElementById('location-search').value.trim();
            const box = document.getElementById('suggestions-box');
            if (query.length < 2) { box.style.display = 'none'; return; }

            debounceTimer = setTimeout(async () => {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=en&format=json`);
                const data = await res.json();
                if (data.results) {
                    box.innerHTML = '';
                    data.results.forEach(place => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        const placeName = [place.name, place.country].filter(Boolean).join(", ");
                        div.innerText = placeName;
                        div.onclick = () => {
                            document.getElementById('location-search').value = placeName;
                            box.style.display = 'none';
                            analyzeClimate(place.latitude, place.longitude, placeName, true);
                        };
                        box.appendChild(div);
                    });
                    box.style.display = 'flex';
                }
            }, 300);
        }

        async function searchLocation() {
            const query = document.getElementById('location-search').value.trim();
            if (!query) return;
            document.getElementById('suggestions-box').style.display = 'none';
            setStatus(`🔍 Geocoding ${query}...`, '#60a5fa');
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`);
                const data = await res.json();
                if (data.results) analyzeClimate(data.results[0].latitude, data.results[0].longitude, data.results[0].name, true);
            } catch (err) { setStatus('❌ API Error.', '#f87171'); }
        }

        function showPopup(dataObj) {
            const popup = document.getElementById('custom-popup');
            popup.innerHTML = `<button class="close-btn" onclick="document.getElementById('custom-popup').style.display='none'">✖</button>` + dataObj.popupHTML;
            popup.style.borderColor = dataObj.color;
            popup.style.display = 'block';
            world.controls().autoRotate = false;
        }

        async function analyzeClimate(lat, lon, regionName, isFocused = false) {
            if (isFocused) {
                document.getElementById('target-region').innerText = regionName;
                setStatus(`🧠 AI calculating 21-day variance for ${regionName}...`, '#60a5fa');
                world.pointOfView({ lat: lat, lng: lon, altitude: 0.6 }, 1500); // Zoomed in closer for satellite view
            }

            try {
                const res = await fetch(`http://localhost:8000/predict?lat=${lat}&lon=${lon}`);
                const aiData = await res.json();

                if (aiData.error) {
                    setStatus("❌ AI Backend Offline. Ensure model.py is running.", "#f87171");
                    return;
                }

                if (isFocused) setStatus(`${aiData.icon} Status: ${aiData.status}`, aiData.hex_color);

                // UPGRADE: Displaying the 21-day baseline to prove the math
                let popupText = `
                    <h3 style="color: ${aiData.hex_color}; margin: 0 0 10px 0;">${aiData.icon} ${aiData.status}</h3>
                    <div style="font-size: 0.9rem; color: #cbd5e1; margin-bottom: 12px;">
                        <b>Target:</b> ${regionName}<br>
                        <b>Current Temp:</b> ${aiData.current_temp.toFixed(1)}°C<br>
                        <b>21-Day Baseline:</b> ${aiData.baseline_21_temp}°C
                    </div>
                    <hr style="border-color: rgba(255,255,255,0.2); margin: 8px 0;"/>
                    <b style="color: #fbbf24; font-size: 0.85rem; letter-spacing: 0.5px;">XGBOOST FORECAST (24H):</b><br>
                    <div style="font-size: 1.1rem; margin-top: 6px;">
                        🌡️ <b>Temp:</b> ${aiData.predicted_temp}°C<br>
                        💧 <b>Rain:</b> ${aiData.predicted_rain} mm
                    </div>
                `;

                const markerData = { lat, lng: lon, name: regionName, temp: aiData.current_temp, color: aiData.hex_color, icon: aiData.icon, popupHTML: popupText };
                
                globeData = globeData.filter(d => d.name !== regionName);
                globeData.push(markerData);

                globeRings = globeRings.filter(d => d.name !== regionName);
                if (aiData.threat_level > 0) {
                    globeRings.push({ 
                        lat, lng: lon, name: regionName, 
                        maxR: aiData.threat_level * 1.5, 
                        propagationSpeed: aiData.threat_level * 0.8, 
                        color: aiData.hex_color 
                    });
                }

                world.htmlElementsData(globeData)
                     .htmlElement(d => {
                         const el = document.createElement('div');
                         el.innerHTML = `<div class="globe-marker" style="border: 1px solid ${d.color}; color: ${d.color};">
                                <span>${d.icon}</span><span style="color: white;">${d.temp.toFixed(1)}°C</span></div>`;
                         el.onclick = () => {
                             world.pointOfView({ lat: d.lat, lng: d.lng, altitude: 0.6 }, 1000);
                             showPopup(d);
                         };
                         return el;
                     });
                     
                world.ringsData(globeRings)
                    .ringColor('color')
                    .ringMaxRadius('maxR')
                    .ringPropagationSpeed('propagationSpeed')
                    .ringRepeatPeriod(800);

                if (isFocused) showPopup(markerData);

            } catch (err) {
                console.error(err);
                if (isFocused) setStatus(`❌ Connection to Local AI Core Failed.`, '#f87171');
            }
        }
        
        function loadGlobalGrid() {
            setStatus("📡 Initializing Neural Scan...", "#fbbf24");
            defaultCities.forEach((city, index) => {
                setTimeout(() => {
                    analyzeClimate(city.lat, city.lon, city.name, false);
                    if (index === defaultCities.length - 1) setStatus("✅ Neural Net Online. Monitoring engaged.", "#4ade80");
                }, index * 300); 
            });
        }

        setTimeout(loadGlobalGrid, 1000);
    </script>
</body>
</html>
