<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate risk | AI Anomaly System</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #ef4444;
            --primary-hover: #dc2626;
            --secondary: #3b82f6;
            --secondary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 800px;
            
            /* Glassmorphism */
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            
            text-align: center;
            transition: all 0.3s ease;
        }

        h2 {
            margin: 0 0 8px 0;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(to right, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { margin: 0; color: var(--text-muted); font-size: 0.95rem; }

        .dashboard-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        #live-time { font-weight: 600; color: #fbbf24; }
        
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus { border-color: var(--secondary); }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:active { transform: scale(0.98); }

        .btn-search {
            background-color: var(--primary);
            color: white;
        }
        .btn-search:hover { background-color: var(--primary-hover); }

        .btn-location {
            background-color: var(--secondary);
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-location:hover { background-color: var(--secondary-hover); }

        #loading-status {
            margin-top: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            height: 20px;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        /* Map UI Tweaks */
        .leaflet-popup-content-wrapper {
            background-color: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            color: #ffffff;
            border: 1px solid var(--primary);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
        }
        .leaflet-popup-tip { background-color: var(--primary); }
        .safe-stat { color: #4ade80; font-weight: bold; }

        /* Autocomplete Suggestions */
        #suggestions-box {
            position: absolute;
            top: 100%; left: 0; width: 100%;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 8px; margin-top: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none; flex-direction: column;
            z-index: 1000; max-height: 250px; overflow-y: auto;
            box-sizing: border-box;
        }

        .suggestion-item {
            padding: 10px 16px; cursor: pointer; color: white;
            font-size: 0.95rem; text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }

        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: rgba(255,255,255,0.1); }

        /* History Widget */
        #history-box {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 999;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 260px;
            display: none;
            color: white;
        }

        #history-box h3 {
            margin: 0 0 12px 0;
            font-size: 1.1rem;
            color: #fbbf24;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .history-row:last-child { border-bottom: none; padding-bottom: 0; }
        .history-date { color: var(--text-muted); }
        .temp-max { color: #f87171; font-weight: 600; }
        .temp-min { color: #60a5fa; font-weight: 600; margin-left: 8px; }
    </style>
</head>

<body>

    <div id="header-container">
        <h2>Spatiotemporal Climate Risk Explorer</h2>
        
        <div class="dashboard-meta">
            <span>Target Region: <strong id="target-region" style="color: white;">Kolkata</strong></span>
            <span id="live-time"></span>
        </div>
        
        <div class="controls">
            <div style="position: relative; flex: 1; min-width: 200px;">
                <input type="text" id="location-search" style="width: 100%; box-sizing: border-box;" placeholder="Search City, Country..." onkeydown="if(event.key === 'Enter') searchLocation()" oninput="handleSearchInput()">
                <div id="suggestions-box"></div>
            </div>
            <button class="btn-search" onclick="searchLocation()">Search Region</button>
            <button class="btn-location" onclick="useMyLocation()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                My Location
            </button>
        </div>

        <div id="loading-status">System Initialized. Awaiting Input.</div>
    </div>

    <div id="history-box">
        <h3>🌤️ 7-Day History</h3>
        <div id="history-list"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. CLOCK --- //
        function updateClock() {
            document.getElementById('live-time').innerText = new Date().toLocaleString('en-IN', { 
                timeZone: 'Asia/Kolkata', 
                month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            }) + " (IST)";
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. MAP SETUP --- //
        var map = L.map('map', { zoomControl: false }).setView([22.5726, 88.3639], 10);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 19
        }).addTo(map);

        let activeLayers = [];

        // --- 3. GEOLOCATION & SEARCH --- //
        function setStatus(msg, color = 'var(--text-muted)') {
            const el = document.getElementById('loading-status');
            el.innerText = msg;
            el.style.color = color;
        }

        let debounceTimer;

        async function handleSearchInput() {
            clearTimeout(debounceTimer);
            const query = document.getElementById('location-search').value.trim();
            const box = document.getElementById('suggestions-box');
            
            if (query.length < 2) {
                if (box) box.style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=en&format=json`);
                    const data = await res.json();
                    
                    if (data.results && data.results.length > 0) {
                        box.innerHTML = '';
                        data.results.forEach(place => {
                            const div = document.createElement('div');
                            div.className = 'suggestion-item';
                            const placeName = [place.name, place.admin1, place.country].filter(Boolean).join(", ");
                            div.innerText = placeName;
                            div.onclick = () => {
                                document.getElementById('location-search').value = placeName;
                                box.style.display = 'none';
                                analyzeClimate(place.latitude, place.longitude, placeName);
                            };
                            box.appendChild(div);
                        });
                        box.style.display = 'flex';
                    } else {
                        box.style.display = 'none';
                    }
                } catch (err) {
                    console.error("Autocomplete err:", err);
                }
            }, 300);
        }

        async function searchLocation() {
            const query = document.getElementById('location-search').value.trim();
            if (!query) return;
            const box = document.getElementById('suggestions-box');
            if (box) box.style.display = 'none';
            
            setStatus(`🔍 Geocoding ${query}...`, '#60a5fa');
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    const place = data.results[0];
                    const placeName = [place.name, place.admin1, place.country].filter(Boolean).join(", ");
                    document.getElementById('location-search').value = placeName;
                    analyzeClimate(place.latitude, place.longitude, placeName);
                } else {
                    setStatus(`❌ Location not found.`, '#f87171');
                }
            } catch (err) {
                setStatus('❌ Error connecting to geocoding API.', '#f87171');
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target.id !== 'location-search') {
                const box = document.getElementById('suggestions-box');
                if (box) box.style.display = 'none';
            }
        });

        function useMyLocation() {
            setStatus('🛰️ Requesting coordinates...', '#60a5fa');
            
            if ("geolocation" in navigator && window.location.protocol !== 'file:') {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        analyzeClimate(position.coords.latitude, position.coords.longitude, "Your Precise Location");
                    },
                    (error) => {
                        console.warn("GPS failed, falling back to IP:", error.message);
                        fallbackToIP();
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                console.warn("Geolocation API unavailable or blocked by file:// protocol. Falling back to IP.");
                fallbackToIP();
            }
        }

        async function fallbackToIP() {
            setStatus('🛰️ Approximating location via IP (GPS unavailable)...', '#f59e0b');
            try {
                const res = await fetch('https://ipinfo.io/json');
                const data = await res.json();
                if (data.loc) {
                    const coords = data.loc.split(',');
                    analyzeClimate(parseFloat(coords[0]), parseFloat(coords[1]), `Your Area (${data.city}, ${data.region})`);
                } else {
                    setStatus('❌ IP Geolocation failed.', '#f87171');
                }
            } catch (err) {
                setStatus('❌ Unable to detect location automatically.', '#f87171');
                console.error(err);
            }
        }

        // --- 4. PYTHON LOGIC CONVERTED TO JS --- //
        /*
            We use Open-Meteo's forecast/historical API to get the last 90 days of temp max.
            Then we apply the 21-day rolling average & standard deviation (2x Danger Limit).
        */
        async function analyzeClimate(lat, lon, regionName) {
            document.getElementById('target-region').innerText = regionName;
            setStatus(`📡 Fetching climate data from Open-Meteo...`, '#60a5fa');
            
            map.flyTo([lat, lon], 10, { duration: 1.5 });
            
            // Clear existing markers
            activeLayers.forEach(layer => map.removeLayer(layer));
            activeLayers = [];

            try {
                // Fetch 90 past days + 1 current day
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min&past_days=90&forecast_days=1&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                
                const times = data.daily.time;
                const temps = data.daily.temperature_2m_max;
                const mins = data.daily.temperature_2m_min;
                // Find the latest day with valid data
                let latestIndex = temps.length - 1;
                while(temps[latestIndex] === null && latestIndex > 0) {
                    latestIndex--;
                }
                
                let currentTemp = temps[latestIndex];
                let currentDate = times[latestIndex];
                
                // Get the last 21 valid days for rolling window calculation
                let windowTemps = temps.slice(Math.max(0, latestIndex - 20), latestIndex + 1).filter(t => t !== null);
                
                let mean = windowTemps.reduce((a, b) => a + b, 0) / windowTemps.length;
                let variance = windowTemps.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (windowTemps.length - 1);
                let std = Math.sqrt(variance);
                
                let limit = mean + (2 * std);
                
                // Round to 1 decimal place matching their python output
                let rTemp = parseFloat(currentTemp.toFixed(1));
                let rLimit = parseFloat(limit.toFixed(1));

                let statusHex = "";
                let alertTitle = "";
                let alertIcon = "";

                if (rTemp > rLimit) {
                    statusHex = "#ef4444"; // Red
                    alertTitle = "HEATWAVE ALERT";
                    alertIcon = "🚨";
                    setStatus(`${alertIcon} CRITICAL: Current Temp exceeds threshold!`, statusHex);
                } else if (rTemp === rLimit) {
                    statusHex = "#eab308"; // Yellow
                    alertTitle = "WARNING LEVEL";
                    alertIcon = "⚠️";
                    setStatus(`${alertIcon} WARNING: Current Temp equals the Danger Limit.`, statusHex);
                } else {
                    statusHex = "#4ade80"; // Green
                    alertTitle = "STABLE CLIMATE";
                    alertIcon = "✅";
                    setStatus(`${alertIcon} SAFE: Normal temperatures detected.`, statusHex);
                }

                let circle = L.circle([lat, lon], {
                    color: statusHex, fillColor: statusHex, fillOpacity: 0.2, radius: 20000
                }).addTo(map);
                
                let marker = L.circleMarker([lat, lon], {
                    color: 'white', weight: 2, fillColor: statusHex, fillOpacity: 1, radius: 8
                }).addTo(map);

                let popupText = `
                    <h3 style="color: ${statusHex}; margin: 0 0 10px 0;">${alertIcon} ${alertTitle}</h3>
                    <b>Location:</b> ${regionName}<br>
                    <b>Date:</b> ${currentDate}<br><br>
                    <b>Current Temp:</b> <span style="font-weight: bold; color: ${statusHex}">${rTemp}°C</span><br>
                    <b>21-Day Avg:</b> ${mean.toFixed(1)}°C<br>
                    <b>Danger Threshold:</b> ${rLimit}°C<br>
                `;
                
                if (rTemp > rLimit) {
                    popupText += `<hr style="border-color: rgba(255,255,255,0.2)"/><i>Exceeded threshold by ${(rTemp - rLimit).toFixed(1)}°C</i>`;
                } else if (rTemp < rLimit) {
                    popupText += `<hr style="border-color: rgba(255,255,255,0.2)"/><i>${(rLimit - rTemp).toFixed(1)}°C below danger threshold.</i>`;
                }

                marker.bindPopup(popupText).openPopup();
                activeLayers.push(circle, marker);

                // Populate 7-Day History Widget
                let historyHtml = "";
                let startIndex = Math.max(0, latestIndex - 6);
                for (let i = startIndex; i <= latestIndex; i++) {
                    if (temps[i] !== null && mins[i] !== null) {
                        let rowDate = new Date(times[i]).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                        let tMax = temps[i].toFixed(1);
                        let tMin = mins[i].toFixed(1);
                        historyHtml += `
                            <div class="history-row">
                                <span class="history-date">${rowDate}</span>
                                <span class="history-temps">
                                    <span class="temp-max">${tMax}°</span> 
                                    <span class="temp-min">${tMin}°</span>
                                </span>
                            </div>
                        `;
                    }
                }
                document.getElementById('history-list').innerHTML = historyHtml;
                document.getElementById('history-box').style.display = "block";

            } catch (err) {
                console.error(err);
                setStatus(`❌ Analysis Failed. Data unavailable.`, '#f87171');
            }
        }
        
        // Auto-load default
        setTimeout(() => analyzeClimate(22.5726, 88.3639, 'Kolkata, India'), 500);

    </script>
</body>

</html>
